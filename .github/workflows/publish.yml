name: Publish to GitHub Packages

on:
  workflow_run:
    workflows:
      - "Create Release"
    types:
      - completed
    branches:
      - prod
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      package-delete: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"

      - name: Delete existing package version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_ID=$(gh api "/user/packages/npm/@ultranomic%2Fvnpt-ekyc-sdk/versions" \
            --jq ".[] | select(.metadata.package.version==\"$VERSION\") | .id")
          if [ -n "$PACKAGE_ID" ]; then
            gh api --method DELETE "/user/packages/npm/@ultranomic%2Fvnpt-ekyc-sdk/versions/$PACKAGE_ID"
            echo "Deleted existing version $VERSION"
          else
            echo "No existing version $VERSION found"
          fi

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
