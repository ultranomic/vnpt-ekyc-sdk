name: Publish to GitHub Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"

      - run: npm publish --force
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
