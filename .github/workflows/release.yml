name: Release & Publish

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate release version
        id: release
        run: echo "version=${{ steps.version.outputs.version }}.$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: v${{ steps.release.outputs.version }}
          generate_release_notes: true

      - name: Update jsr.json version
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          node -e "const j=require('./jsr.json'); j.version='$VERSION'; require('fs').writeFileSync('jsr.json', JSON.stringify(j, null, 2)+'\n')"

      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types --allow-dirty
